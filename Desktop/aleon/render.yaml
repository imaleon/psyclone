services:
  # Static Site Service
  - type: web
    name: telegram-chat-app
    env: static
    buildCommand: "echo 'No build needed for static site'"
    staticPublishPath: .
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_ENV
        value: production
    
  # Optional: Add a Node.js backend if needed later
  # - type: web
  #   name: telegram-chat-api
  #   env: node
  #   buildCommand: "npm install && npm run build"
  #   startCommand: "npm start"
  #   envVars:
  #     - key: NODE_ENV
  #       value: production
  #     - key: PORT
  #       value: 10000

# Auto-deploy configuration
autoDeploy: true

# Environment-specific settings
environments:
  production:
    autoDeploy: true
  preview:
    autoDeploy: true
