<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="menu-btn">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <div class="search-box">
                    <input type="text" placeholder="Search" id="searchInput">
                </div>
            </div>
            <div class="chat-list" id="chatList"></div>
        </div>
        <div class="chat-area">
            <div class="chat-header" id="chatHeader">
                <div class="chat-info">
                    <div class="avatar" id="headerAvatar"></div>
                    <div class="chat-details">
                        <h3 id="headerName">Select a chat</h3>
                        <span id="headerStatus">online</span>
                    </div>
                </div>
                <div class="chat-actions">
                    <button class="action-btn" id="searchBtn">🔍</button>
                    <button class="action-btn" id="moreBtn">⋮</button>
                </div>
            </div>
            <div class="messages" id="messages"></div>
            <div class="input-area">
                <button class="attach-btn" id="attachBtn">📎</button>
                <div class="message-input">
                    <input type="text" id="messageInput" placeholder="Message" autocomplete="off">
                </div>
                <button class="send-btn" id="sendBtn">➤</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
